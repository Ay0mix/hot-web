        <div class="form-container">
            <h1>Vacancy Application Form</h1>
            <p>Please fill out the form below to apply for the position.</p>
            
            <form action="submit-application.php" method="POST" enctype="multipart/form-data">
                <!-- Full Name -->
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
                </div>
    
                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
    
                <!-- Phone Number -->
                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" required placeholder="Enter your phone number">
                </div>
    
                <!-- Position Applied For -->
                <div class="form-group">
                    <label for="position">Position Applied For:</label>
                    <select id="position" name="position" required>
                        <option value="">Select a position</option>
                        <option value="softwareEngineer">Software Engineer</option>
                        <option value="dataAnalyst">Data Analyst</option>
                        <option value="projectManager">Project Manager</option>
                        <option value="uiuxDesigner">UI/UX Designer</option>
                    </select>
                </div>
    
                <!-- Resume Upload -->
                <div class="form-group">
                    <label for="resume">Upload Your Resume (PDF or DOCX):</label>
                    <input type="file" id="resume" name="resume" accept=".pdf,.docx" required>
                </div>
    
                <!-- Submit Button -->
                <div class="form-group">
                    <button type="submit" class="submit-btn">Submit Application</button>
                </div>
            </form>
        </div>
